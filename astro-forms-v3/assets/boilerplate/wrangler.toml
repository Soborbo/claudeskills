name = "form-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# KV namespace — used for rate limiting AND duplicate detection
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-kv-namespace-id"
# Create: npx wrangler kv:namespace create "RATE_LIMIT"

# Secrets (set via `wrangler secret put`):
# TURNSTILE_SECRET_KEY
# RESEND_API_KEY
# BREVO_API_KEY
# GOOGLE_SERVICE_ACCOUNT_EMAIL
# GOOGLE_PRIVATE_KEY
# GOOGLE_SHEET_ID
# IP_HASH_SALT
