name: Tracking Kit Tests

on:
  pull_request:
    paths:
      - 'tracking-kit/**'
      - '.github/workflows/tracking-kit-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'tracking-kit/**'

permissions:
  contents: read

jobs:
  unit-and-api:
    name: Security · Unit · API · Cloudflare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracking-kit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tracking-kit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Security scanners (forbidden patterns + secrets)
        run: npm run test:security

      - name: Unit tests
        run: npm run test:unit

      - name: API route tests
        run: npm run test:api

      - name: Cloudflare env / rate-limit tests
        run: npm run test:cloudflare

      - name: Coverage report
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracking-kit-coverage
          path: tracking-kit/coverage
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: unit-and-api
    defaults:
      run:
        working-directory: tracking-kit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tracking-kit/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tracking-kit/playwright-report
          if-no-files-found: ignore
